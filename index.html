<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC 2026 Bet Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 14px; min-height: 100vh; }

    header { background: #161b22; border-bottom: 1px solid #30363d; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    header h1 { font-size: 16px; font-weight: 600; color: #f0f6fc; letter-spacing: .3px; }
    .header-meta { display: flex; align-items: center; gap: 14px; }
    #last-updated { font-size: 12px; color: #8b949e; }

    button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: background .15s, border-color .15s; }
    button:hover { background: #30363d; border-color: #8b949e; }
    button:disabled { opacity: .5; cursor: default; }

    nav { background: #161b22; border-bottom: 1px solid #30363d; padding: 0 24px; display: flex; }
    .tab { padding: 12px 18px; cursor: pointer; color: #8b949e; border-bottom: 2px solid transparent; font-size: 13px; font-weight: 500; transition: color .15s; user-select: none; }
    .tab:hover { color: #c9d1d9; }
    .tab.active { color: #f0f6fc; border-bottom-color: #1f6feb; }

    main { padding: 24px; max-width: 1100px; margin: 0 auto; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .state-box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 48px 24px; text-align: center; color: #8b949e; }
    .state-box.error { border-color: #da3633; color: #f85149; }
    .state-box .title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .state-box .sub { font-size: 12px; color: #6e7681; margin-top: 6px; font-family: monospace; }

    .owner-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .owner-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 18px 20px; }
    .owner-card .name { font-size: 13px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
    .owner-card .balance { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
    .owner-card .balance.pos { color: #3fb950; }
    .owner-card .balance.neg { color: #f85149; }
    .owner-card .balance.zero { color: #8b949e; }
    .owner-card .sub { font-size: 12px; color: #6e7681; }

    .section-title { font-size: 13px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: .6px; margin: 24px 0 10px; }

    .pair-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; margin-bottom: 6px; font-size: 13px; }
    .pair-row .amt { font-weight: 600; }
    .pair-row .amt.pos { color: #3fb950; }
    .pair-row .amt.zero { color: #6e7681; }

    .owner-section { margin-bottom: 32px; }
    .owner-header { font-size: 14px; font-weight: 600; color: #f0f6fc; padding: 10px 0 8px; border-bottom: 1px solid #30363d; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 9px 12px; color: #8b949e; font-weight: 500; border-bottom: 1px solid #30363d; white-space: nowrap; font-size: 12px; }
    td { padding: 8px 12px; border-bottom: 1px solid #21262d; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #1c2128; }

    .earn-pos { color: #3fb950; font-weight: 600; }
    .dim { color: #6e7681; }

    .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 500; white-space: nowrap; }
    .badge-active  { background: #0d4429; color: #3fb950; border: 1px solid #1b5c30; }
    .badge-elim    { background: #3d1a1a; color: #f85149; border: 1px solid #6b2020; }
    .badge-pending { background: #0d2846; color: #58a6ff; border: 1px solid #1b4070; }
    .badge-goal    { background: #1c2a0d; color: #7ee787; border: 1px solid #2a4a10; }
    .badge-match   { background: #0d2846; color: #58a6ff; border: 1px solid #1b4070; }

    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }

<script>
// ═══════════════════════════════════════════════════════
// DRAFT DATA  (locked)
// ═══════════════════════════════════════════════════════

const OWNERS = ['Den', 'Jong', 'Kao', 'Pi'];

const TEAM_DRAFT = {
  Den:  ['Czechia','Qatar','Morocco','United States','Ivory Coast','Tunisia','Belgium','Spain','Senegal','Argentina','Uzbekistan','Panama'],
  Jong: ['South Africa','Switzerland','Scotland','Australia','Curaçao','Netherlands','New Zealand','Uruguay','Norway','Austria','Colombia','England'],
  Kao:  ['South Korea','Bosnia and Herzegovina','Brazil','Türkiye','Germany','Japan','Egypt','Saudi Arabia','Iraq','Jordan','DR Congo','Croatia'],
  Pi:   ['Mexico','Canada','Haiti','Paraguay','Ecuador','Sweden','Iran','Cape Verde','France','Algeria','Portugal','Ghana'],

const SCORER_DRAFT = {
  Den:  ['Messi','Alvarez','Rapinha','Olise','Saka','Cherki','Doku','Martinelli'],
  Jong: ['Mbappe','Yamal','Halaland','K. Havertz','L. Martinez','Cunha','Gyokerez','B. Fermin'],

const TEAM_OWNER = {};
Object.entries(TEAM_DRAFT).forEach(([o, ts]) => ts.forEach(t => { TEAM_OWNER[t] = o; }));

const SCORER_OWNER = {};
Object.entries(SCORER_DRAFT).forEach(([o, ps]) => ps.forEach(p => { SCORER_OWNER[p] = o; }));

// ═══════════════════════════════════════════════════════
// PAYOUT RULES  (locked)
// ═══════════════════════════════════════════════════════

const MATCH_PAYOUTS = {
  group: 150, round_of_32: 150, round_of_16: 200,
  quarterfinal: 400, semifinal: 600, third_place: 600, final: 800,
};
const GOAL_PAYOUT_GROUP    = 80;
const GOAL_PAYOUT_KNOCKOUT = 100;
const CHAMPION_BONUS       = 1200;

// ═══════════════════════════════════════════════════════
// NAME NORMALIZATION
// ═══════════════════════════════════════════════════════

const TEAM_ALIASES = {

  "bosnia and herzegovina": 'Bosnia and Herzegovina',
  'bosnia & herzegovina': 'Bosnia and Herzegovina',
  "cote d'ivoire": 'Ivory Coast', "côte d'ivoire": 'Ivory Coast', 'ivory coast': 'Ivory Coast',
  'turkey': 'Türkiye', 'turkiye': 'Türkiye', 'türkiye': 'Türkiye',
  'dr congo': 'DR Congo', 'democratic republic of congo': 'DR Congo',
  'democratic republic of the congo': 'DR Congo', 'congo dr': 'DR Congo', 'dr. congo': 'DR Congo', 'drc': 'DR Congo',
  'curacao': 'Curaçao', 'curaçao': 'Curaçao',
  'usa': 'United States', 'united states': 'United States', 'united states of america': 'United States',
  'cabo verde': 'Cape Verde', 'cape verde': 'Cape Verde',
  'czechia': 'Czechia', 'czech republic': 'Czechia',
  'south korea': 'South Korea', 'korea republic': 'South Korea', 'republic of korea': 'South Korea',
  'south africa': 'South Africa',
  'saudi arabia': 'Saudi Arabia', 'new zealand': 'New Zealand',
  'qatar': 'Qatar', 'switzerland': 'Switzerland', 'scotland': 'Scotland', 'brazil': 'Brazil',
  'haiti': 'Haiti', 'australia': 'Australia', 'paraguay': 'Paraguay', 'germany': 'Germany',
  'ecuador': 'Ecuador', 'tunisia': 'Tunisia', 'netherlands': 'Netherlands', 'japan': 'Japan',
  'sweden': 'Sweden', 'belgium': 'Belgium', 'egypt': 'Egypt', 'iran': 'Iran',
  'spain': 'Spain', 'uruguay': 'Uruguay', 'senegal': 'Senegal', 'norway': 'Norway',
  'iraq': 'Iraq', 'france': 'France', 'argentina': 'Argentina', 'austria': 'Austria',
  'jordan': 'Jordan', 'algeria': 'Algeria', 'uzbekistan': 'Uzbekistan', 'colombia': 'Colombia',
  'portugal': 'Portugal', 'panama': 'Panama', 'england': 'England', 'croatia': 'Croatia',
  'ghana': 'Ghana', 'canada': 'Canada', 'morocco': 'Morocco', 'mexico': 'Mexico',
};

// ESPN displayName → draft canonical name
const SCORER_ALIASES = {
  // Den
  'lionel messi': 'Messi', 'leo messi': 'Messi', 'messi': 'Messi', 'l. messi': 'Messi',
  'julian alvarez': 'Alvarez', 'julián álvarez': 'Alvarez', 'j. alvarez': 'Alvarez',
  'raphinha': 'Rapinha', 'rapinha': 'Rapinha',
  'michael olise': 'Olise', 'olise': 'Olise',
  'bukayo saka': 'Saka', 'saka': 'Saka',
  'rayan cherki': 'Cherki', 'cherki': 'Cherki',
  'jeremy doku': 'Doku', 'doku': 'Doku',
  'gabriel martinelli': 'Martinelli', 'martinelli': 'Martinelli',
  // Jong
  'kylian mbappe': 'Mbappe', 'kylian mbappé': 'Mbappe', 'mbappé': 'Mbappe', 'mbappe': 'Mbappe', 'k. mbappe': 'Mbappe', 'k. mbappé': 'Mbappe',
  'lamine yamal': 'Yamal', 'yamal': 'Yamal',
  'erling haaland': 'Halaland', 'haaland': 'Halaland',
  'kai havertz': 'K. Havertz', 'k. havertz': 'K. Havertz', 'havertz': 'K. Havertz',
  'lautaro martinez': 'L. Martinez', 'lautaro martínez': 'L. Martinez', 'l. martinez': 'L. Martinez',
  'matheus cunha': 'Cunha', 'cunha': 'Cunha',
  'victor gyokeres': 'Gyokerez', 'víctor gyökeres': 'Gyokerez', 'gyökeres': 'Gyokerez', 'gyokeres': 'Gyokerez',
  'fermin lopez': 'B. Fermin', 'fermín lópez': 'B. Fermin', 'fermin': 'B. Fermin', 'b. fermin': 'B. Fermin',
  // Kao
  'harry kane': 'Kane', 'kane': 'Kane',
  'mikel oyarzabal': 'Oyazabal', 'oyarzabal': 'Oyazabal',
  'florian wirtz': 'Wirtz', 'wirtz': 'Wirtz',
  'rafael leao': 'Rafael Leao', 'rafael leão': 'Rafael Leao', 'leão': 'Rafael Leao',
  'luis diaz': 'Diaz', 'luis díaz': 'Diaz', 'díaz': 'Diaz',
  'darwin nunez': 'Nunez', 'darwin núñez': 'Nunez', 'núñez': 'Nunez',
  'mohamed salah': 'Salah', 'salah': 'Salah',
  'ousmane dembele': 'Ousmane Dembele', 'ousmane dembélé': 'Ousmane Dembele', 'dembélé': 'Ousmane Dembele',
  // Pi
  'vinicius junior': 'V. Junior', 'vinícius júnior': 'V. Junior', 'v. junior': 'V. Junior', 'v. júnior': 'V. Junior',
  'ferran torres': 'F. Torres', 'f. torres': 'F. Torres',
  'cristiano ronaldo': 'Ronaldo', 'ronaldo': 'Ronaldo',
  'jamal musiala': 'Musiala', 'musiala': 'Musiala',
  'cody gakpo': 'Gakpo', 'gakpo': 'Gakpo',
  'marcus rashford': 'Rasford', 'rashford': 'Rasford',
  'ayase ueda': 'Ueda', 'ueda': 'Ueda',
};

function normalizeTeam(raw) {
  if (!raw) return null;
  return TEAM_ALIASES[raw.toLowerCase().trim()] || raw.trim();
}

function normalizeScorer(raw) {
  if (!raw) return null;
  return SCORER_ALIASES[raw.toLowerCase().trim()] || null;
}

// ═══════════════════════════════════════════════════════
// ESPN API CONFIG
// ═══════════════════════════════════════════════════════

const ESPN_MATCHES   = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260719&limit=200';
const ESPN_STANDINGS = 'https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings';

// ESPN season.slug → internal round key
const SLUG_TO_ROUND = {
  'group-stage':         'group',
  'round-of-32':         'round_of_32',
  'round-of-16':         'round_of_16',
  'quarterfinal':        'quarterfinal',
  'quarterfinals':       'quarterfinal',
  'semifinal':           'semifinal',
  'semifinals':          'semifinal',
  'third-place-playoff': 'third_place',
  'final':               'final',
};

// ═══════════════════════════════════════════════════════
// ESPN DATA PARSING
// ═══════════════════════════════════════════════════════

function parseESPNMatches(events) {
  return (events || []).map(event => {
    const comp  = event.competitions?.[0];
    const home  = comp?.competitors?.find(c => c.homeAway === 'home');
    const away  = comp?.competitors?.find(c => c.homeAway === 'away');
    const round = SLUG_TO_ROUND[event.season?.slug] || null;

    const goals = (comp?.details || [])
      .filter(d => d.scoringPlay === true && d.ownGoal !== true)
      .map(d => ({
        playerName: d.athletesInvolved?.[0]?.displayName || '',
        teamId:     d.team?.id,
        homeTeamId: home?.team?.id,
      }));

    return {
      round,
      finished:   comp?.status?.type?.completed === true,
      homeTeam:   normalizeTeam(home?.team?.displayName || ''),
      awayTeam:   normalizeTeam(away?.team?.displayName || ''),
      homeWinner: home?.winner === true,
      awayWinner: away?.winner === true,
      isDraw:     home?.winner === false && away?.winner === false && comp?.status?.type?.completed === true,
      goals,
    };
  });
}

function parseESPNStandings(standings) {
  const result = {};
  (standings.children || []).forEach(group => {
    const groupName = group.name || '';
    (group.standings?.entries || []).forEach(entry => {
      const teamName = normalizeTeam(entry.team?.displayName || '');
      if (!teamName) return;
      const s = {};
      (entry.stats || []).forEach(st => { s[st.name] = st.value; });
      result[teamName] = {
        group:    groupName,
        pos:      s.rank    || 0,
        pts:      s.points  || 0,
        w:        s.wins    || 0,
        d:        s.ties    || 0,
        l:        s.losses  || 0,
        gf:       s.pointsFor     || 0,
        ga:       s.pointsAgainst || 0,
        advanced: s.advanced === 1,
      };
    });
  });
  return result;
}

function toArray(data) {
  return Array.isArray(data) ? data : [];
}

// ═══════════════════════════════════════════════════════
// CALCULATION ENGINE
// ═══════════════════════════════════════════════════════

function calculate(matches, groupStandings) {
  const transactions  = [];
  const teamEarnings  = {};
  const scorerGoals   = {};
  const teamRound     = {};

  Object.values(TEAM_DRAFT).flat().forEach(t  => { teamEarnings[t] = 0; });
  Object.values(SCORER_DRAFT).flat().forEach(p => { scorerGoals[p]  = { goals: 0, earnings: 0 }; });

  const roundOrder = ['group','round_of_32','round_of_16','quarterfinal','semifinal','third_place','final'];
  let champTeam = null;

  for (const match of matches) {
    if (!match.finished || !match.round) continue;

    const { round, homeTeam, awayTeam, homeWinner, awayWinner, isDraw, goals } = match;
    const payout    = MATCH_PAYOUTS[round];
    const homeOwner = homeTeam ? TEAM_OWNER[homeTeam] : null;
    const awayOwner = awayTeam ? TEAM_OWNER[awayTeam] : null;

    // Track furthest round per team
    [homeTeam, awayTeam].forEach(tm => {
      if (!tm) return;
      const prev = teamRound[tm];
      if (!prev || roundOrder.indexOf(round) > roundOrder.indexOf(prev)) teamRound[tm] = round;
    });

    // ── Match-win payout ──
    if (homeOwner && awayOwner && homeOwner !== awayOwner && payout && !isDraw) {
      const winOwner  = homeWinner ? homeOwner : awayOwner;
      const loseOwner = homeWinner ? awayOwner : homeOwner;
      const winTeam   = homeWinner ? homeTeam  : awayTeam;

      transactions.push({ type: 'match_win', from: loseOwner, to: winOwner, amount: payout,
        desc: `${homeTeam} vs ${awayTeam} — ${winTeam} won (${round.replace(/_/g,' ')})` });

      teamEarnings[winTeam] = (teamEarnings[winTeam] || 0) + payout;
    }

    // ── Champion bonus ──
    if (round === 'final' && !isDraw) {
      const champ      = homeWinner ? homeTeam : awayTeam;
      const champOwner = champ ? TEAM_OWNER[champ] : null;
      champTeam = champ;
      if (champOwner) {
        OWNERS.filter(o => o !== champOwner).forEach(o => {
          transactions.push({ type: 'champion_bonus', from: o, to: champOwner, amount: CHAMPION_BONUS,
            desc: `Champion bonus — ${champ} wins the World Cup` });
        });
      }
    }

    // ── Goal payouts ──
    const goalRate = (round !== 'group') ? GOAL_PAYOUT_KNOCKOUT : GOAL_PAYOUT_GROUP;

    goals.forEach(({ playerName }) => {
      const canonical   = normalizeScorer(playerName);
      if (!canonical) return;
      const scorerOwner = SCORER_OWNER[canonical];
      if (!scorerOwner) return;

      scorerGoals[canonical].goals    += 1;
      scorerGoals[canonical].earnings += goalRate * 3;

      OWNERS.filter(o => o !== scorerOwner).forEach(o => {
        transactions.push({ type: 'goal', from: o, to: scorerOwner, amount: goalRate,
          desc: `Goal by ${canonical} (${round.replace(/_/g,' ')})` });
      });
    });
  }

  // ── Owner balances ──
  const balances = {};
  OWNERS.forEach(o => { balances[o] = { received: 0, paid: 0 }; });
  transactions.forEach(t => { balances[t.to].received += t.amount; balances[t.from].paid += t.amount; });

  const topScorers = Object.entries(scorerGoals)
    .filter(([, v]) => v.goals > 0)
    .sort((a, b) => b[1].goals - a[1].goals);

  return { transactions, teamEarnings, scorerGoals, balances, groupStandings, teamRound, topScorers, champTeam };
}

// ═══════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════

function fmt(n) { return '฿' + n.toLocaleString(); }
function sgn(n) { return n > 0 ? '+' : ''; }

const ROUND_LABELS = {
  group: 'Group Stage', round_of_32: 'Rd of 32', round_of_16: 'Rd of 16',
  quarterfinal: 'Quarterfinal', semifinal: 'Semifinal', third_place: '3rd Place', final: 'Final',
};

function teamStatusBadge(team, groupStandings, teamRound) {
  const round = teamRound[team];
  const gs    = groupStandings[team];

  if (round && round !== 'group') return `<span class="badge badge-active">${ROUND_LABELS[round] || round}</span>`;

  if (gs) {
    if (gs.advanced) return `<span class="badge badge-active">Advanced</span>`;
    if (gs.pos === 1) return `<span class="badge badge-pending">1st in grp</span>`;
    if (gs.pos === 2) return `<span class="badge badge-pending">2nd in grp</span>`;
    if (gs.pos === 3) return `<span class="badge badge-pending">3rd (pending)</span>`;
    return `<span class="badge badge-elim">Eliminated</span>`;
  }
  return `<span class="dim">&mdash;</span>`;
}

function renderOverview(c) {
  let h = '<div class="owner-cards">';
  OWNERS.forEach(o => {
    const net = c.balances[o].received - c.balances[o].paid;
    const cls = net > 0 ? 'pos' : net < 0 ? 'neg' : 'zero';
    h += `<div class="owner-card">
      <div class="name">${o}</div>
      <div class="balance ${cls}">${sgn(net)}${fmt(net)}</div>
      <div class="sub">Earned ${fmt(c.balances[o].received)} &middot; Paid ${fmt(c.balances[o].paid)}</div>
    </div>`;
  });
  h += '</div>';

  h += `<div class="section-title">&#127942; Champion</div>`;
  if (c.champTeam) {
    const co = TEAM_OWNER[c.champTeam];
    h += `<div class="pair-row"><span><strong>${c.champTeam}</strong> <span class="dim">(${co})</span></span>
      <span class="amt pos">+${fmt(800 + 3600)} Final &amp; bonus</span></div>`;
  } else {
    h += `<div class="pair-row"><span class="dim">No champion yet &mdash; tournament in progress</span><span class="amt zero">Pending</span></div>`;
  }

  h += `<div class="section-title">&#128094; Top Scorers (drafted players)</div>`;
  if (c.topScorers.length === 0) {
    h += `<div class="pair-row"><span class="dim">No goals from drafted players yet</span><span>&mdash;</span></div>`;
  } else {
    c.topScorers.slice(0, 8).forEach(([name, data], i) => {
      const owner = SCORER_OWNER[name];
      h += `<div class="pair-row" style="${i > 0 ? 'opacity:.75' : ''}">
        <span>${i === 0 ? '<strong>' : ''}${name}${i === 0 ? '</strong>' : ''} <span class="dim">(${owner})</span>
        &nbsp;&middot;&nbsp; ${data.goals} goal${data.goals !== 1 ? 's' : ''}</span>
        <span class="${i === 0 ? 'amt pos' : ''}">${fmt(data.earnings)}</span>
      </div>`;
    });
  }
  document.getElementById('tab-overview').innerHTML = h;
}

function renderTeams(c) {
  let h = '';
  OWNERS.forEach(owner => {
    h += `<div class="owner-section">
      <div class="owner-header">${owner}</div>
      <table><thead><tr>
        <th>Team</th><th>Group</th><th>Pos</th>
        <th>W</th><th>D</th><th>L</th><th>Pts</th>
        <th>Status</th><th>Earn</th>
      </tr></thead><tbody>`;

    TEAM_DRAFT[owner].forEach(team => {
      const gs   = c.groupStandings[team];
      const earn = c.teamEarnings[team] || 0;
      h += `<tr>
        <td><strong>${team}</strong></td>
        <td>${gs?.group || '&mdash;'}</td>
        <td>${gs?.pos   || '&mdash;'}</td>
        <td>${gs?.w     ?? '&mdash;'}</td>
        <td>${gs?.d     ?? '&mdash;'}</td>
        <td>${gs?.l     ?? '&mdash;'}</td>
        <td>${gs?.pts   ?? '&mdash;'}</td>
        <td>${teamStatusBadge(team, c.groupStandings, c.teamRound)}</td>
        <td>${earn > 0 ? `<span class="earn-pos">${fmt(earn)}</span>` : '<span class="dim">0</span>'}</td>
      </tr>`;
    });
    h += `</tbody></table></div>`;
  });
  document.getElementById('tab-teams').innerHTML = h;
}

function renderScorers(c) {
  let h = '';
  OWNERS.forEach(owner => {
    h += `<div class="owner-section">
      <div class="owner-header">${owner}</div>
      <table><thead><tr><th>Player</th><th>Goals</th><th>Earned</th></tr></thead><tbody>`;
    SCORER_DRAFT[owner].forEach(player => {
      const d = c.scorerGoals[player] || { goals: 0, earnings: 0 };
      h += `<tr>
        <td>${player}</td>
        <td>${d.goals > 0 ? `<span style="color:#f0f6fc;font-weight:600">${d.goals}</span>` : '<span class="dim">0</span>'}</td>
        <td>${d.earnings > 0 ? `<span class="earn-pos">${fmt(d.earnings)}</span>` : '<span class="dim">0</span>'}</td>
      </tr>`;
    });
    h += `</tbody></table></div>`;
  });
  document.getElementById('tab-scorers').innerHTML = h;
}

function renderLedger(c) {
  let h = '';
  const count = c.transactions.length;
  h += `<div class="section-title">All Transactions (${count})</div>`;

  if (count === 0) {
    h += `<div class="state-box">No transactions recorded yet</div>`;
  } else {
    h += `<table><thead><tr>
      <th>Type</th><th>Description</th><th>From</th><th>To</th><th style="text-align:right">Amount</th>
    </tr></thead><tbody>`;
    [...c.transactions].reverse().forEach(t => {
      const badge =
        t.type === 'match_win'      ? '<span class="badge badge-match">Match Win</span>' :
        t.type === 'goal'           ? '<span class="badge badge-goal">Goal</span>' :
        t.type === 'champion_bonus' ? '<span class="badge badge-bonus">Champion</span>' :
                                      '<span class="badge badge-bonus">Bonus</span>';
      h += `<tr>
        <td>${badge}</td>
        <td class="dim">${t.desc}</td>
        <td>${t.from}</td>
        <td style="color:#3fb950">${t.to}</td>
        <td style="text-align:right;color:#3fb950">${fmt(t.amount)}</td>
      </tr>`;
    });
    h += `</tbody></table>`;
  }
  document.getElementById('tab-ledger').innerHTML = h;
}

// ═══════════════════════════════════════════════════════
// LOAD + ORCHESTRATION
// ═══════════════════════════════════════════════════════

let loading = false;

function setAllTabs(html) {
  ['overview','teams','scorers','ledger'].forEach(t => { document.getElementById('tab-' + t).innerHTML = html; });
}

async function loadData() {
  if (loading) return;
  loading = true;
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.textContent = 'Loading…';
  setAllTabs('<div class="state-box"><span class="spinner"></span> Fetching live data&hellip;</div>');

  try {
    const [eventsData, standingsData] = await Promise.all([
      fetch(ESPN_MATCHES).then(r => { if (!r.ok) throw new Error(`Matches: HTTP ${r.status}`); return r.json(); }),
      fetch(ESPN_STANDINGS).then(r => { if (!r.ok) throw new Error(`Standings: HTTP ${r.status}`); return r.json(); }),
    ]);

    const matches       = parseESPNMatches(eventsData.events);
    const groupStandings = parseESPNStandings(standingsData);
    const computed      = calculate(matches, groupStandings);

    renderOverview(computed);
    renderTeams(computed);
    renderScorers(computed);
    renderLedger(computed);

    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();

  } catch (err) {
    setAllTabs(`<div class="state-box error">
      <div class="title">Data unavailable &mdash; try refreshing</div>
      <div>Could not reach ESPN. Check your connection.</div>
      <div class="sub">${err.message}</div>
    </div>`);
    document.getElementById('last-updated').textContent = 'Failed to load';
  } finally {
    loading = false;
    btn.disabled = false;
    btn.textContent = '蘵 Refresh';
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(el => el.classList.toggle('active', el.id === 'tab-' + tab));
}

loadData();
</script>
