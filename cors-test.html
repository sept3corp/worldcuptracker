<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>worldcup26.ir CORS Test</title>
<style>
  body { font-family: monospace; padding: 2rem; background: #111; color: #eee; }
  h1 { color: #fff; }
  .result { margin-top: 1rem; padding: 1rem; border-radius: 6px; white-space: pre-wrap; word-break: break-all; }
  .ok  { background: #1a3a1a; border: 1px solid #4c4; color: #8f8; }
  .err { background: #3a1a1a; border: 1px solid #c44; color: #f88; }
  .info { background: #1a2a3a; border: 1px solid #44c; color: #8af; }
  button { padding: 0.5rem 1.5rem; font-size: 1rem; cursor: pointer; margin-right: 0.5rem; }
  #log { margin-top: 1rem; }
</style>
</head>
<body>
<h1>worldcup26.ir CORS Test</h1>
<p>Tests whether <code>https://worldcup26.ir</code> allows browser-side fetch (no proxy).</p>
<button onclick="runTest('/get/games')">Test /get/games</button>
<button onclick="runTest('/get/groups')">Test /get/groups</button>
<button onclick="runTest('/get/teams')">Test /get/teams</button>
<div id="log"></div>

<script>
const log = document.getElementById('log');

function addEntry(cls, text) {
  const d = document.createElement('div');
  d.className = 'result ' + cls;
  d.textContent = text;
  log.prepend(d);
}

async function runTest(path) {
  const url = 'https://worldcup26.ir' + path;
  addEntry('info', '⟳ Fetching ' + url + ' …');
  const t0 = Date.now();
  try {
    const res = await fetch(url);
    const ms = Date.now() - t0;
    if (!res.ok) {
      addEntry('err', `✗ HTTP ${res.status} ${res.statusText}  (${ms}ms)\nCORS headers present but server returned an error.`);
      return;
    }
    const text = await res.text();
    let preview;
    try {
      const json = JSON.parse(text);
      const keys = Array.isArray(json)
        ? `Array[${json.length}] — first item keys: ${Object.keys(json[0] || {}).join(', ')}`
        : `Object keys: ${Object.keys(json).join(', ')}`;
      preview = keys + '\n\n' + JSON.stringify(json[0] ?? json, null, 2).slice(0, 800);
    } catch {
      preview = text.slice(0, 800);
    }
    addEntry('ok', `✓ CORS OK — ${res.status} in ${ms}ms\n\n${preview}`);
  } catch (err) {
    const ms = Date.now() - t0;
    addEntry('err',
      `✗ FETCH FAILED (${ms}ms)\n\n${err}\n\n` +
      (err.message.includes('CORS') || err.message.includes('fetch')
        ? 'Likely cause: server does not send Access-Control-Allow-Origin header (CORS blocked).'
        : 'Could be CORS block, network error, or DNS failure — check browser DevTools → Network tab for detail.')
    );
  }
}
</script>
</body>
</html>
